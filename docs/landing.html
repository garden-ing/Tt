<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>딩동 — 회의 시간, 딩동 한 번으로</title>
<meta name="description" content="Google Calendar·Slack를 연결해 참석자 일정을 자동으로 모으고, 가장 좋은 회의 시간을 추천해요. 딩동.">
<meta property="og:title" content="딩동 — 회의 시간, 딩동 한 번으로">
<meta property="og:description" content="Google Calendar·Slack를 연결해 가장 좋은 회의 시간을 추천해요.">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root{
    --blue:#3182F6; --navy:#1D4A79; --ink:rgba(0,12,30,.8); --ink-3:rgba(0,19,43,.58);
    --app-w:1440; --app-h:1024;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    color:var(--ink); -webkit-font-smoothing:antialiased; overflow-x:hidden;
    background:#fff;
  }
  a{color:inherit;text-decoration:none}

  /* ── HERO ── */
  .hero{
    position:relative; width:100%; min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:40px 0 20px; overflow:hidden;
    background:
      linear-gradient(180deg, rgba(145,229,252,.7) 6%, rgb(255,255,255) 44%, rgba(145,204,252,.7) 86%, rgb(255,255,255) 100%);
  }
  /* brand mark */
  .brand{position:absolute; top:26px; left:32px; z-index:20; display:flex; align-items:center; gap:8px; font-weight:800; font-size:20px; letter-spacing:-.02em; color:#0B2A4A}
  .brand .m{width:30px;height:30px;display:grid;place-items:center;background:var(--blue);border-radius:9px;box-shadow:0 6px 14px rgba(49,130,246,.35)}

  /* scaled stage — exact Figma coords on a 1440×517 canvas */
  .stage-wrap{width:100%;display:flex;justify-content:center}
  .stage{position:relative; width:1440px; height:517px; transform-origin:top center; flex:0 0 auto}
  .stage > *{position:absolute}

  /* app card (right) */
  .card{
    left:612px; top:55px; width:757.86px; height:541.33px;
    background:#fff; padding:4.164px; border-radius:16.656px;
    box-shadow:0 40px 90px rgba(21,63,120,.20), 0 8px 24px rgba(21,63,120,.10);
  }
  .card .screen{width:749.531px;height:533px;border-radius:16.656px;overflow:hidden;position:relative;background:#fff}
  .card iframe{position:absolute;top:0;left:0;width:1440px;height:1024px;border:0;transform:scale(.52067);transform-origin:top left}
  /* click-catcher so the whole card is a link (preview stays visual) */
  .card .catch{position:absolute;inset:0;z-index:3;cursor:pointer;background:transparent}
  .card .open{
    position:absolute; z-index:4; right:12px; bottom:12px; display:flex; align-items:center; gap:5px;
    background:rgba(17,38,66,.82); color:#fff; font-size:12px; font-weight:700; padding:7px 12px; border-radius:999px;
    backdrop-filter:blur(4px); opacity:0; transform:translateY(6px); transition:opacity .25s, transform .25s; pointer-events:none;
  }
  .card:hover .open{opacity:1;transform:none}

  /* connectors + dots (SVG overlay across full stage) */
  .wires{left:0;top:0;width:1440px;height:517px;overflow:visible;pointer-events:none}
  .wire{fill:none;stroke:#8FB4E6;stroke-width:2.2;stroke-linecap:round;stroke-dasharray:2 7;
    stroke-dashoffset:220; transition:stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1)}
  .dot{fill:#fff;stroke:#3182F6;stroke-width:2.4;opacity:0;transform:scale(.2);transform-origin:center;transition:opacity .3s, transform .35s cubic-bezier(.2,1.4,.4,1)}

  /* pills */
  .pill{display:flex;align-items:center;border:.925px solid #fff;border-radius:273px;
    opacity:0;transform:scale(.85) translateY(8px);transition:opacity .5s ease, transform .55s cubic-bezier(.2,1,.3,1)}
  .pill img{display:block}
  .pill span{font-family:"Pretendard Variable",Pretendard;font-weight:500;color:var(--ink-3);white-space:nowrap}
  .pill.gcal{left:144px;top:83px;transform-origin:center;padding:16.39px 21.85px 16.39px 22.21px;gap:16.39px;
    background:rgba(231,231,231,.5);rotate:-3.32deg}
  .pill.gcal img{width:43.706px;height:43.706px}
  .pill.gcal span{font-size:33.317px;line-height:43.57px}
  .pill.slack{left:333px;top:225px;padding:16.39px 21.85px 16.39px 22.21px;gap:16.39px;
    background:rgba(235,235,235,.5);rotate:9.1deg}
  .pill.slack img{width:43.71px;height:43.71px}
  .pill.slack span{font-size:33.317px;line-height:43.57px}

  /* 서비스 써보기 button */
  .try{
    left:71px;top:360px;display:flex;align-items:center;gap:12px;
    padding:19.997px 26.663px 19.997px 27.1px;border:1px solid #fff;border-radius:333.291px;
    background:linear-gradient(90deg, rgba(180,211,255,.85), rgba(81,153,255,.85));
    box-shadow:0 20px 44px rgba(49,110,220,.28);
    cursor:pointer; opacity:0; transform:scale(.8) translateY(10px);
    transition:opacity .6s cubic-bezier(.2,1,.3,1), transform .6s cubic-bezier(.2,1.5,.35,1), box-shadow .2s;
  }
  .try:hover{box-shadow:0 26px 54px rgba(49,110,220,.4)}
  .try:active{transform:scale(.97)}
  .try span{font-family:"Pretendard Variable",Pretendard;font-weight:500;font-size:40.651px;line-height:53.16px;
    letter-spacing:-.813px;color:var(--navy);white-space:nowrap}
  .try img{width:54px;height:54px;display:block}
  .try .pulse{position:relative}
  .try .pulse::after{content:"";position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--navy);opacity:0;animation:none}

  /* played state */
  .stage.play .pill{opacity:1;transform:none}
  .stage.play .pill.gcal{transform:none}
  .stage.play .wire{stroke-dashoffset:0}
  .stage.play .dot{opacity:1;transform:scale(1)}
  .stage.play .try{opacity:1;transform:none}
  .stage.play .try .pulse::after{animation:ring 2.2s ease-out .3s infinite}
  @keyframes ring{0%{opacity:.5;transform:scale(.8)}70%{opacity:0;transform:scale(1.5)}100%{opacity:0}}

  /* delays: pills → wires → dots → button (~2.5s) */
  .stage.play .pill.gcal{transition-delay:.15s}
  .stage.play .pill.slack{transition-delay:.4s}
  .stage.play .card{}
  .stage.play .wire.w1{transition-delay:.9s}
  .stage.play .wire.w2{transition-delay:1.25s}
  .stage.play .dot.d1{transition-delay:1.7s}
  .stage.play .dot.d2{transition-delay:2.0s}
  .stage.play .try{transition-delay:2.5s}

  .card{opacity:0;transform:translateX(24px);transition:opacity .7s ease, transform .7s cubic-bezier(.2,1,.3,1)}
  .stage.play .card{opacity:1;transform:none;transition-delay:.1s}

  /* caption under hero */
  .cap{position:absolute;left:0;right:0;bottom:26px;text-align:center;z-index:15;
    font-size:15px;font-weight:600;color:rgba(29,74,121,.72);letter-spacing:-.01em;
    opacity:0;animation:fadeUp .8s ease 2.9s forwards}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* ── 실제 동작 영상 섹션 ── */
  .demo-sec{background:#F7F9FB;padding:92px 24px 100px;border-top:1px solid #EEF1F4}
  .demo-inner{max-width:1040px;margin:0 auto;text-align:center}
  .demo-sec .eyebrow{font-size:15px;font-weight:800;color:var(--blue);letter-spacing:-.01em;margin-bottom:12px}
  .demo-sec h2{font-size:clamp(26px,4vw,40px);font-weight:800;letter-spacing:-.03em;line-height:1.22;color:#191F28}
  .demo-sec .sub{max-width:520px;margin:16px auto 0;color:var(--ink-3);font-size:17px;font-weight:500;line-height:1.6}
  .vframe{position:relative;margin:48px auto 0;max-width:940px;border-radius:16px;overflow:hidden;
    border:1px solid #E5E9ED;box-shadow:0 30px 70px rgba(21,63,120,.16);background:#0d1117}
  .vframe .bar{display:flex;align-items:center;gap:7px;height:38px;padding:0 15px;background:#F1F3F5;border-bottom:1px solid #E5E9ED}
  .vframe .bar i{width:11px;height:11px;border-radius:50%;display:inline-block}
  .vframe .bar i:nth-child(1){background:#FF5F57}.vframe .bar i:nth-child(2){background:#FEBC2E}.vframe .bar i:nth-child(3){background:#28C840}
  .vframe .bar .u{margin-left:12px;flex:1;height:22px;border-radius:7px;background:#fff;border:1px solid #E5E9ED;display:flex;align-items:center;padding:0 10px;font-size:12px;color:var(--ink-3);font-weight:600}
  .vframe video{display:block;width:100%;height:auto;background:#0d1117}
  .vph{aspect-ratio:16/10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    background:linear-gradient(160deg,#EAF2FF,#F7F9FB);color:#5B6B7C;padding:32px;text-align:center}
  .vph .ic{width:64px;height:64px;border-radius:18px;background:#fff;display:grid;place-items:center;box-shadow:0 8px 20px rgba(21,63,120,.12)}
  .vph b{font-size:17px;color:#334155;font-weight:800}
  .vph small{font-size:14px;color:#7A8794;font-weight:500;line-height:1.6;max-width:420px}
  .vph code{background:#fff;border:1px solid #E1E7EC;border-radius:6px;padding:2px 7px;font-size:12.5px;color:#3182F6;font-weight:700}

  footer{padding:30px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
    color:var(--ink-3);font-size:14px;font-weight:500;border-top:1px solid #EEF1F4}
  footer .brand2{display:flex;align-items:center;gap:7px;font-weight:800;color:var(--ink)}
  footer .brand2 .m{width:22px;height:22px;display:grid;place-items:center;background:var(--blue);border-radius:6px}

  @media (max-width:520px){
    .brand{top:18px;left:18px;font-size:18px}
    .cap{font-size:13px}
  }
</style>
</head>
<body>

<section class="hero">
  <div class="brand">
    <span class="m"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M12 3a1 1 0 0 1 1 1v.6a6 6 0 0 1 5 5.9v3.2l1.4 2.1a1 1 0 0 1-.83 1.55H5.43a1 1 0 0 1-.83-1.55L6 13.7v-3.2a6 6 0 0 1 5-5.9V4a1 1 0 0 1 1-1Z" fill="#fff"/><path d="M9.5 19a2.5 2.5 0 0 0 5 0" stroke="#fff" stroke-width="1.7" stroke-linecap="round"/></svg></span>
    딩동
  </div>

  <div class="stage-wrap">
    <div class="stage" id="stage">

      <!-- connectors -->
      <svg class="wires" viewBox="0 0 1440 517" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path class="wire w1" d="M505 118 C 548 110, 578 112, 612 116" pathLength="220"/>
        <path class="wire w2" d="M512 286 C 552 289, 582 294, 612 300" pathLength="220"/>
        <circle class="dot d1" cx="500" cy="119" r="6.1"/>
        <circle class="dot d2" cx="507" cy="286" r="6.1"/>
      </svg>

      <!-- pills -->
      <div class="pill gcal"><img src="assets/gcal.svg" alt=""><span>Google Calendar</span></div>
      <div class="pill slack"><img src="assets/slack.svg" alt=""><span>Slack</span></div>

      <!-- try button -->
      <a class="try app-link" href="#" target="_blank" rel="noopener">
        <span>서비스 써보기</span>
        <span class="pulse"><img src="assets/arrow-right-circle.svg" alt="바로가기"></span>
      </a>

      <!-- live app card -->
      <div class="card">
        <div class="screen">
          <iframe src="https://seoljeongwon-toss.vercel.app/" title="딩동 라이브 데모" loading="eager" scrolling="no"></iframe>
          <a class="catch app-link" href="#" target="_blank" rel="noopener" aria-label="딩동 앱 열기"></a>
          <span class="open">새 탭에서 열기 ↗</span>
        </div>
      </div>

    </div>
  </div>

  <div class="cap">실제로 작동하는 딩동이에요 — 오른쪽 화면을 눌러 직접 써보세요</div>
</section>

<!-- ── 실제 동작 영상 (루프) ── -->
<section class="demo-sec" id="demo">
  <div class="demo-inner">
    <div class="eyebrow">직접 보기</div>
    <h2>실제로 이렇게 동작해요</h2>
    <p class="sub">회의 정보 입력부터 참석자 선택, 시간 추천까지 — 딩동의 실제 흐름이에요.</p>

    <div class="vframe">
      <div class="bar"><i></i><i></i><i></i><span class="u">dingdong · 실제 동작 데모</span></div>
      <video id="demoVid" autoplay muted loop playsinline preload="metadata" hidden>
        <source src="assets/demo.webm" type="video/webm">
        <source src="assets/demo.mp4" type="video/mp4">
      </video>
      <div class="vph" id="vph">
        <div class="ic"><svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M8 5.5v13l11-6.5-11-6.5Z" fill="#3182F6"/></svg></div>
        <b>데모 영상을 넣어주세요</b>
        <small>화면 녹화 파일을 <code>docs/assets/demo.mp4</code> 로 추가하면 이 자리에서 자동 루프 재생돼요. (아래 안내 참고)</small>
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="brand2"><span class="m"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 3a1 1 0 0 1 1 1v.6a6 6 0 0 1 5 5.9v3.2l1.4 2.1a1 1 0 0 1-.83 1.55H5.43a1 1 0 0 1-.83-1.55L6 13.7v-3.2a6 6 0 0 1 5-5.9V4a1 1 0 0 1 1-1Z" fill="#fff"/></svg></span>딩동</div>
  <span>© 2026 딩동. 회의 시간, 딩동 한 번으로.</span>
</footer>

<script>
  var APP_URL = "https://seoljeongwon-toss.vercel.app/";
  document.querySelectorAll('.app-link').forEach(function(a){ a.href = APP_URL; });

  var stage = document.getElementById('stage');

  // scale the 1440-wide stage to fit the viewport width
  function fit(){
    var pad = window.innerWidth < 640 ? 16 : 48;
    var avail = window.innerWidth - pad;
    var s = Math.min(1, avail / 1440);
    stage.style.transform = 'scale(' + s + ')';
    // reserve correct height in the flex flow (stage is transform-origin top center)
    stage.parentElement.style.height = (517 * s) + 'px';
  }
  fit();
  window.addEventListener('resize', fit, {passive:true});

  // play the intro once fonts + first paint are ready
  function play(){ stage.classList.add('play'); }
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(function(){ requestAnimationFrame(function(){ setTimeout(play, 120); }); });
  } else {
    window.addEventListener('load', function(){ setTimeout(play, 120); });
  }
  // safety: never leave it un-played
  setTimeout(play, 1200);

  // demo video: stay on the placeholder until the file actually loads,
  // then swap the real (looping) video in — so it "just works" once added.
  (function(){
    var v = document.getElementById('demoVid'), ph = document.getElementById('vph');
    if(!v) return;
    function showVideo(){ if(v.hidden){ v.hidden = false; ph.hidden = true; v.play().catch(function(){}); } }
    v.addEventListener('loadeddata', showVideo);
    v.addEventListener('canplay', showVideo);
    // pause when off-screen to save resources
    if('IntersectionObserver' in window){
      new IntersectionObserver(function(es){ es.forEach(function(e){
        if(v.hidden) return;
        if(e.isIntersecting){ v.play().catch(function(){}); } else { v.pause(); }
      }); }, {threshold:.25}).observe(v);
    }
  })();
</script>
</body>
</html>
